name: generatenode

on:
  schedule:
    - cron: '*/20 * * * *'  # 正确的每20分钟运行一次，如需限定每天3点改为：*/20 3 * * *
  workflow_dispatch:

# 核心防并发配置：同一时间只允许一个任务运行，避免旧任务被强制取消
concurrency:
  group: generatenode-workflow
  cancel-in-progress: false  # 禁止新任务取消正在运行的旧任务

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Setup Node.js 24
      uses: actions/setup-node@v4
      with:
        node-version: '24'

    - name: Setup Python 3.12
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install dependencies and mihomo
      # 严格错误退出机制，任何命令失败立即终止
      run: |
        set -euo pipefail
        sudo apt-get update -qq
        sudo apt-get install -y -qq wget apt-transport-https software-properties-common bash python3-pip
        # 修复：替换为全版本兼容的wget参数，保留重试、超时、失败退出能力
        wget --fail --tries=3 --timeout=30 https://github.com/MetaCubeX/mihomo/releases/download/v1.19.12/mihomo-linux-amd64-v3-v1.19.12.gz
        # 解压前校验文件有效性
        if [ ! -s mihomo-linux-amd64-v3-v1.19.12.gz ]; then
          echo "[ERROR] mihomo下载失败，文件为空"
          exit 1
        fi
        gzip -d mihomo-linux-amd64-v3-v1.19.12.gz
        mv mihomo-linux-amd64-v3-v1.19.12 mihomo
        chmod +x mihomo
        sudo mv mihomo /usr/local/bin/
        # 验证mihomo安装成功
        mihomo -v
        # 升级pip并安装依赖
        python3 -m pip install --upgrade pip -qq
        python3 -m pip install requests PyYAML httpx psutil requests_html lxml[html_clean] -qq
        # 验证所有依赖导入成功，提前暴露问题
        python3 -c "import requests, yaml, httpx, psutil, requests_html, lxml"
        echo "所有依赖安装完成"

    - name: Run ClashForge.py
      # 单步骤超时控制，-u强制实时输出，避免无输出超时被杀
      timeout-minutes: 300
      run: |
        set -euo pipefail
        python3 -u ClashForge.py

    - name: Commit and push config file
      run: |
        set -euo pipefail
        git config --global user.name 'github-actions'
        git config --global user.email 'github-actions@github.com'
        git add -f clash_config.yaml
        # 修复commit语法，正确支持空提交
        git commit -m 'Update clash_config.yaml' || true
        # 推送前拉取最新代码，避免冲突
        git pull --rebase origin HEAD || true
        # 重试推送机制
        for i in {1..5}; do
          git push origin HEAD && break || (echo "Push failed, retrying in 10 seconds..." && sleep 10)
        done
