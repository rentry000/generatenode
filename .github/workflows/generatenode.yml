name: generatenode

on:
  schedule:
    - cron: '*/20 * * * *'  # 正确的每20分钟运行一次，如需限定每天3点改为：*/20 3 * * *
  workflow_dispatch:

# 核心防并发配置：同一时间只允许一个任务运行，避免旧任务被取消
concurrency:
  group: generatenode-workflow
  cancel-in-progress: false  # 禁止新任务取消正在运行的旧任务

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Setup Node.js 24
      uses: actions/setup-node@v4
      with:
        node-version: '24'

    - name: Setup Python 3.12
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'  # 用稳定大版本，避免小版本兼容性问题
        cache: 'pip'

    - name: Install dependencies and mihomo
      # 开启错误退出：任何命令失败立即终止，避免连锁异常
      run: |
        set -euo pipefail
        sudo apt-get update
        sudo apt-get install -y wget apt-transport-https software-properties-common bash python3-pip
        # 修复：wget添加失败退出，避免下载空文件
        wget --fail-on-error --tries=3 --timeout=30 https://github.com/MetaCubeX/mihomo/releases/download/v1.19.12/mihomo-linux-amd64-v3-v1.19.12.gz
        gzip -d mihomo-linux-amd64-v3-v1.19.12.gz
        mv mihomo-linux-amd64-v3-v1.19.12 mihomo
        chmod +x mihomo
        sudo mv mihomo /usr/local/bin/
        # 验证mihomo安装成功
        mihomo -v
        # 升级pip并安装依赖
        python3 -m pip install --upgrade pip
        python3 -m pip install requests PyYAML httpx asyncio psutil requests_html lxml[html_clean]
        # 验证依赖安装成功
        python3 -c "import requests, yaml, httpx, asyncio, psutil, requests_html, lxml"
        echo "所有依赖安装完成"

    - name: Run ClashForge.py
      # 单步骤超时控制，避免无限运行；-u参数强制实时输出，解决无输出超时
      timeout-minutes: 300
      run: |
        set -euo pipefail
        python3 -u ClashForge.py

    - name: Commit and push config file
      run: |
        set -euo pipefail
        git config --global user.name 'github-actions'
        git config --global user.email 'github-actions@github.com'
        git add -f clash_config.yaml
        # 修复：|| true移到引号外，正确实现允许空提交
        git commit -m 'Update clash_config.yaml' || true
        # 推送前先拉取最新代码，避免冲突
        git pull --rebase origin HEAD
        for i in {1..5}; do
          git push origin HEAD && break || (echo "Push failed, retrying in 10 seconds..." && sleep 10)
        done
